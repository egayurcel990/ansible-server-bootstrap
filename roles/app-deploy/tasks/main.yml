---
- name: Create app directory
  file:
    path: /opt/uptime-monitor
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0755"

- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: /opt/uptime-monitor/docker-compose.yml
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0644"

- name: Pull latest app image
  become: true
  community.docker.docker_image:
    name: "{{ app_image }}"
    source: pull
    force_source: true
  register: image_pull

- name: Recreate container if image updated
  become: true
  community.docker.docker_compose_v2:
    project_src: /opt/uptime-monitor
    state: present
    recreate: always
  when: image_pull.changed

- name: Ensure app is running (no image update)
  become: true
  community.docker.docker_compose_v2:
    project_src: /opt/uptime-monitor
    state: present
  when: not image_pull.changed
